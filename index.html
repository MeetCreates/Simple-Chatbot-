<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>

    <!-- Flask CSS Link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="navbar-title">🤖 ChatBot</span>
    </nav>

    <!-- About Section -->
    <section class="about-section">
        <h2>About Chatbot</h2>
        <p>
            This is a simple chatbot built using Flask. 
            Ask anything and get instant responses!
        </p>
    </section>

    <!-- Chatbox -->
    <div class="chat-container">
        <div class="chat-box" id="chat-box"></div>

        <div class="input-container">
            <input type="text" id="user" placeholder="Type your message..." autofocus>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Script -->
    <script>
        const input = document.getElementById("user");

        // Enter key support
        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        function sendMessage() {
            let userMessage = input.value;

            if (userMessage.trim() === "") return;

            let chatBox = document.getElementById("chat-box");

            // User message
            chatBox.innerHTML += `<div class='user-message'>${userMessage}</div>`;
            input.value = "";

            // Auto scroll
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send to backend
            fetch(`/get?msg=${userMessage}`)
                .then(response => response.text())
                .then(data => {
                    chatBox.innerHTML += `<div class='bot-message'>${data}</div>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
        }
    </script>

</body>
</html>
